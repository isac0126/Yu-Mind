<head>
    <meta charset="UTF-8">

    <link type="text/css" rel="stylesheet" href="https://cdn.jsdelivr.net/npm/jsmind@0.5.3/style/jsmind.css" />

    <style>
        body { 
            margin: 0; 
            padding: 0; 
            background-color: #f8f9fa; 
            font-family: 'Noto Sans KR', sans-serif;
        }
        #toolbar { 
            padding: 15px 20px; 
            background: #ffffff; 
            box-shadow: 0 2px 5px rgba(0,0,0,0.05); 
            display: flex; 
            gap: 15px; 
            align-items: center; 
            z-index: 10; 
            position: relative; 
            flex-wrap: wrap;
        }
        #jsmind_container { 
            width: 100vw; 
            height: calc(100vh - 65px); 
            background: #f4f5f7; 
        }
        select, button { 
            padding: 8px 12px; 
            border: 1px solid #ddd; 
            border-radius: 6px; 
            font-family: inherit; 
            font-size: 14px; 
            cursor: pointer; 
            outline: none;
            background-color: #fff;
            transition: all 0.2s;
        }
        button:hover { background-color: #f0f0f0; border-color: #bbb; }
        .btn-save { background-color: #4ea1d3; color: white; border-color: #4ea1d3; font-weight: bold; }
        .btn-save:hover { background-color: #3b8dbd; border-color: #3b8dbd; color: white; }
        .btn-load { background-color: #6c757d; color: white; border-color: #6c757d; font-weight: bold; }
        .btn-load:hover { background-color: #5a6268; border-color: #5a6268; color: white; }
        .help-text { 
            font-size: 14px; 
            color: #555; 
            margin-left: auto; 
            background: #eef2f5;
            padding: 8px 15px;
            border-radius: 20px;
        }
        
        /* 레벨별 마인드맵 스타일 디자인 */

            border: 2px solid #e53935 !important;
            border-radius: 8px !important;
            font-weight: bold !important;
            box-shadow: 0 3px 6px rgba(0,0,0,0.16) !important;
        }
        jmnode.node-sub {
            background-color: #fdd835 !important; 
            color: #212121 !important;            
            border: 2px solid #fdd835 !important;
            border-radius: 6px !important;
            font-weight: bold !important;
        }
        jmnode.node-ext {
            background-color: #ffffff !important; 
            color: #212121 !important;            
            border: 2px solid #212121 !important; 
            border-radius: 4px !important;
        }
