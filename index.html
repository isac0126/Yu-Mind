<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>나만의 독서 마인드맵 (글자 색상 및 기본 검정 추가)</title>
    
    <link type="text/css" rel="stylesheet" href="https://cdn.jsdelivr.net/npm/jsmind@0.5.3/style/jsmind.css" />
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/jsmind@0.5.3/js/jsmind.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&family=Nanum+Myeongjo:wght@400;700&family=Nanum+Pen+Script&display=swap" rel="stylesheet">

    <style>
        body { 
            margin: 0; 
            padding: 0; 
            background-color: #f8f9fa; 
            font-family: 'Noto Sans KR', sans-serif;
        }
        #toolbar { 
            padding: 15px 20px; 
            background: #ffffff; 
            box-shadow: 0 2px 5px rgba(0,0,0,0.05); 
            display: flex; 
            gap: 15px; 
            align-items: center; 
            z-index: 10; 
            position: relative; 
            flex-wrap: wrap;
        }
        #jsmind_container { 
            width: 100vw; 
            height: calc(100vh - 65px); 
            background: #f4f5f7; 
        }
        select, button { 
            padding: 8px 12px; 
            border: 1px solid #ddd; 
            border-radius: 6px; 
            font-family: inherit; 
            font-size: 14px; 
            cursor: pointer; 
            outline: none;
            background-color: #fff;
            transition: all 0.2s;
        }
        button:hover { background-color: #f0f0f0; border-color: #bbb; }
        .btn-save { background-color: #4ea1d3; color: white; border-color: #4ea1d3; font-weight: bold; }
        .btn-save:hover { background-color: #3b8dbd; border-color: #3b8dbd; color: white; }
        .btn-load { background-color: #6c757d; color: white; border-color: #6c757d; font-weight: bold; }
        .btn-load:hover { background-color: #5a6268; border-color: #5a6268; color: white; }
        
        /* 색상 변경 버튼 전용 스타일 */
        .btn-color { padding: 6px 10px; border: 2px solid; border-radius: 4px; font-weight: bold; font-size: 13px; }
        .btn-color:hover { opacity: 0.7; background-color: #fff; }

        .help-text { 
            font-size: 14px; 
            color: #555; 
            margin-left: auto; 
            background: #eef2f5;
            padding: 8px 15px;
            border-radius: 20px;
        }
        
        /* 레벨별 마인드맵 스타일 디자인 */
        jmnode.node-root {
            background-color: #e53935 !important; 
            color: #ffffff;            
            border: 2px solid #e53935 !important;
            border-radius: 8px !important;
            font-weight: bold !important;
            box-shadow: 0 3px 6px rgba(0,0,0,0.16) !important;
        }
        jmnode.node-sub {
            background-color: #fdd835 !important; 
            color: #000000;            
            border: 2px solid #fdd835 !important;
            border-radius: 6px !important;
            font-weight: bold !important;
        }
        jmnode.node-ext {
            background-color: #ffffff !important; 
            color: #000000; /* 기본 글자색을 완전한 검정으로 설정 */          
            border: 2px solid #000000 !important; /* 테두리도 완전한 검정으로 통일 */
            border-radius: 4px !important;
        }

        /* 텍스트 입력창이 0px로 쪼그라드는 것을 방지 */
        .jsmind-editor {
            min-width: 100px !important;
            font-family: inherit !important;
            border: 2px solid #4ea1d3 !important;
            border-radius: 4px;
            padding: 2px;
            color: #000000; /* 입력할 때도 검정 글씨로 보이게 설정 */
        }

        /* 폰트 스타일 */
        .font-noto jmnode { font-family: 'Noto Sans KR', sans-serif !important; }
        .font-myeongjo jmnode { font-family: 'Nanum Myeongjo', serif !important; font-size: 15px !important; }
        .font-pen jmnode { font-family: 'Nanum Pen Script', cursive !important; font-size: 22px !important; }
    </style>
</head>
<body>

    <div id="toolbar">
        <label for="font-selector"><b>✍️ 폰트:</b></label>
        <select id="font-selector" onchange="changeFont()">
            <option value="font-noto">노토 산스</option>
            <option value="font-myeongjo">나눔 명조</option>
            <option value="font-pen">나눔 펜 스크립트</option>
        </select>
        
        <div style="display: flex; gap: 5px; align-items: center; margin-left: 5px; border-left: 2px solid #eee; padding-left: 15px; border-right: 2px solid #eee; padding-right: 15px;">
            <b>🎨 글자 색:</b>
            <button class="btn-color" style="color: #000000; border-color: #000000;" onclick="changeTextColor('#000000')">검정</button>
            <button class="btn-color" style="color: #e53935; border-color: #e53935;" onclick="changeTextColor('#e53935')">빨강</button>
            <button class="btn-color" style="color: #8e24aa; border-color: #8e24aa;" onclick="changeTextColor('#8e24aa')">보라</button>
            <button class="btn-color" style="color: #fb8c00; border-color: #fb8c00;" onclick="changeTextColor('#fb8c00')">주황</button>
            <button class="btn-color" style="color: #212121; border-color: #bbb;" onclick="changeTextColor('default')">기본</button>
        </div>

        <button class="btn-save" onclick="saveMindMap()">💾 저장</button>
        <button class="btn-load" onclick="triggerFileInput()">📂 불러오기</button>
        <input type="file" id="file-input" accept=".json" style="display: none;" onchange="loadMindMap(event)">

        <div class="help-text">
            <strong>💡 더블클릭:</strong> 수정 · 
            <strong>Tab:</strong> 하위 추가 ·
