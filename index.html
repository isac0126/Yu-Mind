<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>나만의 독서 마인드맵</title>
    
    <link type="text/css" rel="stylesheet" href="https://cdn.jsdelivr.net/npm/jsmind@0.5.3/style/jsmind.css" />
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/jsmind@0.5.3/js/jsmind.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&family=Nanum+Myeongjo:wght@400;700&family=Nanum+Pen+Script&display=swap" rel="stylesheet">

    <style>
        body { 
            margin: 0; 
            padding: 0; 
            background-color: #f8f9fa; 
            font-family: 'Noto Sans KR', sans-serif;
        }
        #toolbar { 
            padding: 15px 20px; 
            background: #ffffff; 
            box-shadow: 0 2px 5px rgba(0,0,0,0.05); 
            display: flex; 
            gap: 15px; 
            align-items: center; 
            z-index: 10; 
            position: relative; 
            flex-wrap: wrap;
        }
        #jsmind_container { 
            width: 100vw; 
            height: calc(100vh - 65px); 
            background: #f4f5f7; 
        }
        select, button { 
            padding: 8px 12px; 
            border: 1px solid #ddd; 
            border-radius: 6px; 
            font-family: inherit; 
            font-size: 14px; 
            cursor: pointer; 
            outline: none;
            background-color: #fff;
            transition: all 0.2s;
        }
        button:hover { background-color: #f0f0f0; border-color: #bbb; }
        .btn-save { background-color: #4ea1d3; color: white; border-color: #4ea1d3; font-weight: bold; }
        .btn-save:hover { background-color: #3b8dbd; border-color: #3b8dbd; color: white; }
        .btn-load { background-color: #6c757d; color: white; border-color: #6c757d; font-weight: bold; }
        .btn-load:hover { background-color: #5a6268; border-color: #5a6268; color: white; }
        .help-text { 
            font-size: 14px; 
            color: #555; 
            margin-left: auto; 
            background: #eef2f5;
            padding: 8px 15px;
            border-radius: 20px;
        }
        
        /* 레벨별 마인드맵 스타일 디자인 */
        jmnode.node-root {
            background-color: #e53935 !important; 
            color: #ffffff !important;            
            border: 2px solid #e53935 !important;
            border-radius: 8px !important;
            font-weight: bold !important;
            box-shadow: 0 3px 6px rgba(0,0,0,0.16) !important;
        }
        jmnode.node-sub {
            background-color: #fdd835 !important; 
            color: #212121 !important;            
            border: 2px solid #fdd835 !important;
            border-radius: 6px !important;
            font-weight: bold !important;
        }
        jmnode.node-ext {
            background-color: #ffffff !important; 
            color: #212121 !important;            
            border: 2px solid #212121 !important; 
            border-radius: 4px !important;
        }

        /* 텍스트 입력창이 0px로 쪼그라드는 것을 방지 */
        .jsmind-editor {
            min-width: 100px !important;
            font-family: inherit !important;
            border: 2px solid #4ea1d3 !important;
            border-radius: 4px;
            padding: 2px;
        }

        /* 폰트 스타일 */
        .font-noto jmnode { font-family: 'Noto Sans KR', sans-serif !important; }
        .font-myeongjo jmnode { font-family: 'Nanum Myeongjo', serif !important; font-size: 15px !important; }
        .font-pen jmnode { font-family: 'Nanum Pen Script', cursive !important; font-size: 22px !important; }
    </style>
</head>
<body>

    <div id="toolbar">
        <label for="font-selector"><b>✍️ 폰트 선택:</b></label>
        <select id="font-selector" onchange="changeFont()">
            <option value="font-noto">노토 산스 (깔끔한 기본)</option>
            <option value="font-myeongjo">나눔 명조 (차분한 독서 감성)</option>
            <option value="font-pen">나눔 펜 스크립트 (다이어리 손글씨 느낌)</option>
        </select>
        
        <button class="btn-save" onclick="saveMindMap()">💾 파일로 저장하기</button>
        <button class="btn-load" onclick="triggerFileInput()">📂 파일 불러오기</button>
        <input type="file" id="file-input" accept=".json" style="display: none;" onchange="loadMindMap(event)">

        <div class="help-text">
            <strong>💡 더블클릭:</strong> 내용 수정 · 
            <strong>Tab:</strong> 하위 추가 · 
            <strong>Enter:</strong> 완료/병렬 추가
        </div>
    </div>

    <div id="jsmind_container" class="font-noto"></div>

    <script>
        var mind = {
            "meta": { "name": "독서 마인드맵", "author": "User" },
            "format": "node_array",
            "data": [
                {"id": "root", "isroot": true, "topic": "📖 책 제목"}
            ]
        };

        var options = {
            container: 'jsmind_container',
            theme: 'primary',
            editable: true,       
            view: { hmargin: 100, vmargin: 50, line_width: 2, line_color: '#555' }
        };

        var jm = new jsMind(options);
        jm.show(mind);

        // 실시간 노드 스타일 감지
        var observer = new MutationObserver(function(mutations) {
            observer.disconnect(); 
            
            var jmnodes = document.querySelectorAll('jmnode');
            jmnodes.forEach(function(el) {
                var nodeid = el.getAttribute('nodeid');
                if (nodeid && jm && jm.mind && jm.mind.nodes) {
                    var node = jm.mind.nodes[nodeid];
                    if (node) {
                        var targetClass = '';
                        if (node.isroot) {
                            targetClass = 'node-root';
                        } else if (node.parent && node.parent.isroot) {
                            targetClass = 'node-sub';
                        } else {
                            targetClass = 'node-ext';
                        }
                        
                        if (!el.classList.contains(targetClass)) {
                            el.classList.remove('node-root', 'node-sub', 'node-ext');
                            el.classList.add(targetClass);
                        }
                    }
                }
            });
            
            observer.observe(document.getElementById('jsmind_container'), { childList: true, subtree: true });
        });

        observer.observe(document.getElementById('jsmind_container'), { childList: true, subtree: true });

        // 더블클릭 시 편집 모드 실행
        document.getElementById('jsmind_container').addEventListener('dblclick', function(e) {
            var target = e.target;
            var jmnode = target.closest('jmnode'); 
            
            if (jmnode) {
                var nodeid = jmnode.getAttribute('nodeid');
                if (nodeid) {
                    jm.select_node(nodeid);
                    setTimeout(function() {
                        jm.begin_edit(nodeid);
                    }, 50);
                }
            }
        });

        // 기능 버튼
        function changeFont() {
            var selectedFont = document.getElementById('font-selector').value;
            var container = document.getElementById('jsmind_container');
            container.className = ''; 
            container.classList.add(selectedFont); 
        }

        function saveMindMap() {
            var mind_data = jm.get_data('node_array');
            var data_string = JSON.stringify(mind_data, null, 2);
            var blob = new Blob([data_string], { type: "application/json" });
            var url = URL.createObjectURL(blob);
            var a = document.createElement('a');
            var today = new Date().toISOString().slice(0, 10);
            a.download = "독서_마인드맵_" + today + ".json";
            a.href = url;
            a.click();
            URL.revokeObjectURL(url);
        }

        function triggerFileInput() {
            document.getElementById('file-input').click();
        }

        function loadMindMap(event) {
            var file = event.target.files[0];
            if (!file) return;
            var reader = new FileReader();
            reader.onload = function(e) {
                try {
                    var mind_data = JSON.parse(e.target.result);
                    jm.show(mind_data);
                } catch (err) {
                    alert("올바르지 않은 마인드맵 파일입니다.");
                }
            };
            reader.readAsText(file);
            event.target.value = '';
        }

        // 단축키 로직
        document.getElementById('jsmind_container').addEventListener('keydown', function(e) {
            var activeEl = document.activeElement;
            var isEditing = activeEl && (activeEl.tagName === 'INPUT' || activeEl.tagName === 'TEXTAREA');

            if (isEditing) {
                if (e.key === 'Enter') {
                    if (e.isComposing || e.keyCode === 229) { return; }
                    activeEl.blur(); 
                    e.preventDefault();
                    e.stopPropagation();
                }
            } else {
                var selected_node = jm.get_selected_node();
                if (selected_node) {
                    if (e.key === 'Enter') {
                        e.preventDefault();
                        e.stopPropagation();
                        var new_id = jsMind.util.uuid.newid();
                        if (selected_node.isroot) {
                            jm.add_node(selected_node, new_id, '새 토픽');
                        } else {
                            jm.insert_node_after(selected_node, new_id, '새 토픽');
                        }
                        jm.select_node(new_id);
                        setTimeout(function() { jm.begin_edit(new_id); }, 50);
                    } else if (e.key === 'Tab') {
                        e.preventDefault();
                        e.stopPropagation();
                        var new_id = jsMind.util.uuid.newid();
                        jm.add_node(selected_node, new_id, '새 토픽');
                        jm.select_node(new_id);
                        setTimeout(function() { jm.begin_edit(new_id); }, 50);
                    } else if (e.key === 'Backspace' || e.key === 'Delete') {
                        if (!selected_node.isroot) {
                            jm.remove_node(selected_node);
                        }
                    }
                }
            }
        }, true);
    </script>
</body>
</html>
