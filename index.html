<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>나만의 독서 마인드맵</title>
    
    <link type="text/css" rel="stylesheet" href="https://cdn.jsdelivr.net/npm/jsmind@0.5.3/style/jsmind.css" />
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/jsmind@0.5.3/js/jsmind.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&family=Nanum+Myeongjo:wght@400;700&family=Nanum+Pen+Script&display=swap" rel="stylesheet">

    <style>
        body { margin: 0; padding: 0; background-color: #f8f9fa; font-family: 'Noto Sans KR', sans-serif; overflow: hidden; }
        #toolbar { padding: 12px 20px; background: #ffffff; box-shadow: 0 2px 5px rgba(0,0,0,0.05); display: flex; gap: 12px; align-items: center; z-index: 10; position: relative; flex-wrap: wrap; }
        
        #jsmind_container { width: 100vw; height: calc(100vh - 65px); background: #f4f5f7; position: relative; }
        .jsmind-inner { cursor: grab; }
        .jsmind-inner:active { cursor: grabbing; }
        
        select, button, .btn-label { padding: 7px 10px; border: 1px solid #ddd; border-radius: 6px; font-family: inherit; font-size: 13px; cursor: pointer; outline: none; background-color: #fff; transition: all 0.2s; box-sizing: border-box; display: inline-block; text-align: center; }
        button:hover, .btn-label:hover { background-color: #f0f0f0; border-color: #bbb; }
        
        .btn-save { background-color: #4ea1d3; color: white; border-color: #4ea1d3; font-weight: bold; }
        .btn-save:hover { background-color: #3b8dbd; border-color: #3b8dbd; color: white; }
        .btn-load { background-color: #6c757d; color: white; border-color: #6c757d; font-weight: bold; line-height: 1.15; margin: 0; }
        .btn-load:hover { background-color: #5a6268; border-color: #5a6268; color: white; }
        .btn-color { padding: 4px 8px; border: 2px solid; border-radius: 4px; font-weight: bold; font-size: 12px; }
        .btn-color:hover { opacity: 0.7; background-color: #fff; }
        .btn-zoom { background-color: #eef2f5; font-weight: bold; color: #333; border-color: #d1d9e0;}
        .help-text { font-size: 13px; color: #555; margin-left: auto; background: #eef2f5; padding: 8px 15px; border-radius: 20px; }
        
        jmnode.node-root { background-color: #e53935 !important; color: #ffffff; border: 2px solid #e53935 !important; border-radius: 8px !important; font-weight: bold !important; box-shadow: 0 3px 6px rgba(0,0,0,0.16) !important; }
        jmnode.node-sub { background-color: #fdd835 !important; color: #000000; border: 2px solid #fdd835 !important; border-radius: 6px !important; font-weight: bold !important; }
        jmnode.node-ext { background-color: #ffffff !important; color: #000000; border: 2px solid #000000 !important; border-radius: 4px !important; }
        jmnode.multi-selected { outline: 3px solid #4ea1d3 !important; outline-offset: 2px; box-shadow: 0 0 10px rgba(78,161,211,0.5) !important; }

        .jsmind-editor { min-width: 100px !important; font-family: inherit !important; border: 2px solid #4ea1d3 !important; border-radius: 4px; padding: 2px; color: #000000; }
        .font-noto jmnode { font-family: 'Noto Sans KR', sans-serif !important; }
        .font-myeongjo jmnode { font-family: 'Nanum Myeongjo', serif !important; font-size: 15px !important; }
        .font-pen jmnode { font-family: 'Nanum Pen Script', cursive !important; font-size: 22px !important; }
        #selection-marquee { display: none; position: absolute; border: 1px dashed #4ea1d3; background: rgba(78, 161, 211, 0.2); z-index: 9999; pointer-events: none; }
    </style>
</head>
<body>

    <div id="toolbar">
        <label for="font-selector"><b>✍️ 폰트:</b></label>
        <select id="font-selector" onchange="changeFont()">
            <option value="font-noto">노토 산스</option>
            <option value="font-myeongjo">나눔 명조</option>
            <option value="font-pen">나눔 펜 스크립트</option>
        </select>
        
        <div style="display: flex; gap: 5px; align-items: center; margin-left: 5px; border-left: 2px solid #eee; padding-left: 10px;">
            <b>🎨 색상:</b>
            <button class="btn-color" style="color: #000000; border-color: #000000;" onclick="changeTextColor('#000000')">검정</button>
            <button class="btn-color" style="color: #e53935; border-color: #e53935;" onclick="changeTextColor('#e53935')">빨강</button>
            <button class="btn-color" style="color: #8e24aa; border-color: #8e24aa;" onclick="changeTextColor('#8e24aa')">보라</button>
            <button class="btn-color" style="color: #fb8c00; border-color: #fb8c00;" onclick="changeTextColor('#fb8c00')">주황</button>
            <button class="btn-color" style="color: #212121; border-color: #bbb;" onclick="changeTextColor('default')">기본</button>
        </div>

        <div style="display: flex; gap: 5px; margin-left: 5px; border-left: 2px solid #eee; padding-left: 10px; border-right: 2px solid #eee; padding-right: 10px;">
            <button class="btn-zoom" onclick="jm.view.zoomIn()">➕ 확대</button>
            <button class="btn-zoom" onclick="jm.view.zoomOut()">➖ 축소</button>
        </div>

        <button class="btn-save" onclick="saveMindMap()">💾 저장</button>
        <label class="btn-label btn-load">
            📂 불러오기
            <input type="file" id="file-input" accept=".json" style="position: absolute; left: -9999px;" onchange="loadMindMap(event)">
        </label>

        <div class="help-text">
            <strong>💡 단축키:</strong> 바탕 드래그(이동) · <code>Cmd/Ctrl+드래그</code> (다중선택)
        </div>
    </div>

    <div id="jsmind_container" class="font-noto"></div>

    <script>
        // 오류로 인해 멈추는 것을 방지하기 위해 전체를 안전하게 실행
        window.onload = function() {
            try {
                var mind = { "meta": { "name": "독서 마인드맵", "author": "User" }, "format": "node_array", "data": [ {"id": "root", "isroot": true, "topic": "📖 책 제목"} ] };
                var options = { container: 'jsmind_container', theme: 'primary', editable: true, view: { hmargin: 100, vmargin: 50, line_width: 2, line_color: '#555' } };
                window.jm = new jsMind(options);
                window.jm.show(mind);

                window.customLines = [];
                window.selectedNodes = new Set(); 

                let marquee = document.createElement('div');
                marquee.id = 'selection-marquee';
                document.body.appendChild(marquee);

                initInteractions();

                var observer = new MutationObserver(function() {
                    document.querySelectorAll('jmnode').forEach(function(el) {
                        var nodeid = el.getAttribute('nodeid');
                        if (nodeid && jm && jm.mind && jm.mind.nodes) {
                            var node = jm.mind.nodes[nodeid];
                            if (node) {
                                var targetClass = '';
                                if (node.isroot) targetClass = 'node-root'; 
                                else if (node.parent && node.parent.isroot) targetClass = 'node-sub'; 
                                else targetClass = 'node-ext';
                                if (!el.classList.contains(targetClass)) { el.classList.remove('node-root', 'node-sub', 'node-ext'); el.classList.add(targetClass); }
                            }
                        }
                    });
                    drawCustomLines(); 
                });
                observer.observe(document.getElementById('jsmind_container'), { childList: true, subtree: true, attributes: true, attributeFilter: ['style', 'class'] });

            } catch (error) {
                console.error("마인드맵 로딩 에러:", error);
            }
        };

        function initInteractions() {
            let container = document.getElementById('jsmind_container');
            let inner = container.querySelector('.jsmind-inner');
            let marquee = document.getElementById('selection-marquee');
            if(!inner) return;

            let isPanning = false, isMarquee = false;
            let startX, startY, scrollLeft, scrollTop, startPageX, startPageY;

            inner.addEventListener('mousedown', (e) => {
                let jmnode = e.target.closest('jmnode');
                if (jmnode) {
                    let id = jmnode.getAttribute('nodeid');
                    if (e.ctrlKey || e.metaKey) { 
                        if (window.selectedNodes.has(id)) window.selectedNodes.delete(id);
                        else window.selectedNodes.add(id);
                        updateSelectionUI(); e.stopPropagation();
                    } else if (!e.shiftKey) { 
                        window.selectedNodes.clear(); window.selectedNodes.add(id); updateSelectionUI();
                    }
                    return;
                }

                if (!e.ctrlKey && !e.metaKey) {
                    window.selectedNodes.clear(); updateSelectionUI();
                    isPanning = true; startX = e.pageX - inner.offsetLeft; startY = e.pageY - inner.offsetTop;
                    scrollLeft = inner.scrollLeft; scrollTop = inner.scrollTop;
                } else {
                    isMarquee = true; startPageX = e.pageX; startPageY = e.pageY;
                    marquee.style.display = 'block'; marquee.style.left = startPageX + 'px'; marquee.style.top = startPageY + 'px';
                    marquee.style.width = '0px'; marquee.style.height = '0px';
                    if (!e.shiftKey) window.selectedNodes.clear(); 
                }
            });

            inner.addEventListener('mousemove', (e) => {
                if (isPanning) {
                    e.preventDefault();
                    inner.scrollLeft = scrollLeft - ((e.pageX - inner.offsetLeft) - startX);
                    inner.scrollTop = scrollTop - ((e.pageY - inner.offsetTop) - startY);
                } else if (isMarquee) {
                    e.preventDefault();
                    let minX = Math.min(startPageX, e.pageX), maxX = Math.max(startPageX, e.pageX);
                    let minY = Math.min(startPageY, e.pageY), maxY = Math.max(startPageY, e.pageY);
                    marquee.style.left = minX + 'px'; marquee.style.top = minY + 'px';
                    marquee.style.width = (maxX - minX) + 'px'; marquee.style.height = (maxY - minY) + 'px';
                    window.selectedNodes.clear();
                    document.querySelectorAll('jmnode').forEach(n => {
                        let rect = n.getBoundingClientRect();
                        if (rect.left < maxX && rect.right > minX && rect.top < maxY && rect.bottom > minY) window.selectedNodes.add(n.getAttribute('nodeid'));
                    });
                    updateSelectionUI();
                }
            });

            window.addEventListener('mouseup', () => { isPanning = false; if (isMarquee) { isMarquee = false; marquee.style.display = 'none'; } });
            inner.addEventListener('mouseleave', () => { isPanning = false; });
        }
        
        function updateSelectionUI() {
            document.querySelectorAll('jmnode').forEach(n => {
                if (window.selectedNodes.has(n.getAttribute('nodeid'))) n.classList.add('multi-selected');
                else n.classList.remove('multi-selected');
            });
        }

        function drawCustomLines() {
            let inner = document.querySelector('.jsmind-inner');
            let jmnodes = document.querySelector('jmnodes');
            if (!inner || !jmnodes) return;

            let svg = document.getElementById('custom-lines-svg');
            if (!svg) {
                svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
                svg.id = 'custom-lines-svg'; svg.style.position = 'absolute'; svg.style.top = '0'; svg.style.left = '0'; svg.style.width = '100%'; svg.style.height = '100%'; svg.style.pointerEvents = 'none'; svg.style.zIndex = '1';
                let defs = document.createElementNS('http://www.w3.org/2000/svg', 'defs');
                defs.innerHTML = `<marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0 0, 10 3.5, 0 7" fill="#8e24aa" /></marker>`;
                svg.appendChild(defs);
                inner.insertBefore(svg, jmnodes); 
            }
            
            svg.querySelectorAll('path').forEach(p => p.remove());
            svg.style.width = jmnodes.style.width; svg.style.height = jmnodes.style.height;
            if(!window.customLines) return;

            window.customLines.forEach(line => {
                let n1 = document.querySelector(`jmnode[nodeid="${line.source}"]`);
                let n2 = document.querySelector(`jmnode[nodeid="${line.target}"]`);
                if (n1 && n2) {
                    let x1 = n1.offsetLeft + (n1.offsetWidth / 2), y1 = n1.offsetTop + (n1.offsetHeight / 2);
                    let x2 = n2.offsetLeft + (n2.offsetWidth / 2), y2 = n2.offsetTop + (n2.offsetHeight / 2);
                    let path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
                    let dx = x2 - x1, cx1 = x1 + dx/3, cy1 = y1 - 80, cx2 = x2 - dx/3, cy2 = y2 - 80;
                    path.setAttribute('d', `M ${x1} ${y1} C ${cx1} ${cy1}, ${cx2} ${cy2}, ${x2} ${y2}`);
                    path.setAttribute('fill', 'none'); path.setAttribute('stroke', '#8e24aa'); path.setAttribute('stroke-width', '2');
                    path.setAttribute('stroke-dasharray', '5,5'); path.setAttribute('marker-end', 'url(#arrowhead)');
                    svg.appendChild(path);
                }
            });
        }

        let linkingSource = null;
        document.addEventListener('click', function(e) {
            if (e.shiftKey) {
                let jmnode = e.target.closest('jmnode');
                if (jmnode) {
                    let id = jmnode.getAttribute('nodeid');
                    if (!linkingSource) {
                        linkingSource = id;
                        jmnode.style.outline = '3px dashed #8e24aa'; jmnode.style.outlineOffset = '2px';
                    } else {
                        if (linkingSource !== id) {
                            let existingIndex = window.customLines.findIndex(l => (l.source === linkingSource && l.target === id) || (l.target === linkingSource && l.source === id));
                            if (existingIndex > -1) window.customLines.splice(existingIndex, 1);
                            else window.customLines.push({source: linkingSource, target: id});
                            drawCustomLines();
                        }
                        let srcNode = document.querySelector(`jmnode[nodeid="${linkingSource}"]`);
                        if(srcNode) srcNode.style.outline = '';
                        linkingSource = null;
                    }
                }
            } else {
                if (linkingSource) {
                    let srcNode = document.querySelector(`jmnode[nodeid="${linkingSource}"]`);
                    if(srcNode) srcNode.style.outline = '';
                    linkingSource = null;
                }
            }
        });

        function changeTextColor(color) {
            let targets = window.selectedNodes.size > 0 ? Array.from(window.selectedNodes) : [];
            let singleSelect = jm.get_selected_node();
            if (targets.length === 0 && singleSelect) targets.push(singleSelect.id);
            if (targets.length === 0) return alert("색상을 변경할 토픽을 선택해주세요!");
            targets.forEach(id => {
                let node = jm.get_node(id);
                if (node) {
                    var el = document.querySelector('jmnode[nodeid="' + id + '"]');
                    if (color === 'default') { node.data['foreground-color'] = ''; if (el) el.style.color = ''; } 
                    else { node.data['foreground-color'] = color; if (el) el.style.color = color; }
                }
            });
        }
        
        function changeFont() {
            var selectedFont = document.getElementById('font-selector').value;
            var container = document.getElementById('jsmind_container');
            container.className = ''; container.classList.add(selectedFont); 
        }

        function saveMindMap() {
            var mind_data = jm.get_data('node_array');
            var exportData = { mind: mind_data, lines: window.customLines || [] };
            var data_string = JSON.stringify(exportData, null, 2);
            var blob = new Blob([data_string], { type: "application/json" });
            var url = URL.createObjectURL(blob);
            var a = document.createElement('a');
            var today = new Date().toISOString().slice(0, 10);
            a.download = "독서_마인드맵_" + today + ".json";
            a.href = url; a.click(); URL.revokeObjectURL(url);
        }

        function loadMindMap(event) {
            var file = event.target.files[0];
            if (!file) return;
            var reader = new FileReader();
            reader.onload = function(e) {
                try {
                    var importData = JSON.parse(e.target.result);
                    if (importData.mind && importData.lines) { jm.show(importData.mind); window.customLines = importData.lines; } 
                    else { jm.show(importData); window.customLines = []; }
                    setTimeout(drawCustomLines, 100);
                } catch (err) { alert("올바르지 않은 마인드맵 파일입니다."); }
            };
            reader.readAsText(file); event.target.value = ''; 
        }

        document.addEventListener('dblclick', function(e) {
            var target = e.target; var jmnode = target.closest('jmnode'); 
            if (jmnode) { var nodeid = jmnode.getAttribute('nodeid'); if (nodeid) { jm.select_node(nodeid); setTimeout(function() { jm.begin_edit(nodeid); }, 50); } }
        });

        document.addEventListener('keydown', function(e) {
            if (!window.jm) return;
            var activeEl = document.activeElement;
            var isEditing = activeEl && (activeEl.tagName === 'INPUT' || activeEl.tagName === 'TEXTAREA');

            if (isEditing) {
                if (e.key === 'Enter') { if (e.isComposing || e.keyCode === 229) return; activeEl.blur(); e.preventDefault(); e.stopPropagation(); }
            } else {
                var single_selected = jm.get_selected_node();
                let targets = window.selectedNodes.size > 0 ? Array.from(window.selectedNodes) : (single_selected ? [single_selected.id] : []);

                if (e.key === 'Enter' && targets.length === 1) {
                    e.preventDefault(); e.stopPropagation();
                    let node = jm.get_node(targets[0]); var new_id = jsMind.util.uuid.newid();
                    if (node.isroot) jm.add_node(node, new_id, '새 토픽'); else jm.insert_node_after(node, new_id, '새 토픽');
                    window.selectedNodes.clear(); window.selectedNodes.add(new_id); updateSelectionUI();
                    jm.select_node(new_id); setTimeout(function() { jm.begin_edit(new_id); }, 50);
                } else if (e.key === 'Tab' && targets.length === 1) {
                    e.preventDefault(); e.stopPropagation();
                    let node = jm.get_node(targets[0]); var new_id = jsMind.util.uuid.newid();
                    jm.add_node(node, new_id, '새 토픽');
                    window.selectedNodes.clear(); window.selectedNodes.add(new_id); updateSelectionUI();
                    jm.select_node(new_id); setTimeout(function() { jm.begin_edit(new_id); }, 50);
                } else if (e.key === 'Backspace' || e.key === 'Delete') {
                    if (targets.length > 0) {
                        targets.forEach(id => {
                            let node = jm.get_node(id);
                            if (node && !node.isroot) { jm.remove_node(node); window.customLines = window.customLines.filter(l => l.source !== id && l.target !== id); }
                        });
                        window.selectedNodes.clear(); updateSelectionUI(); drawCustomLines();
                    }
                }
            }
        });
    </script>
</body>
</html>
